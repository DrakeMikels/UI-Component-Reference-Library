<!doctype html>
<html lang="en" class="h-full bg-ink-50 text-ink-900 antialiased dark:bg-ink-900 dark:text-ink-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive catalog of UI components and design systems with rich metadata and navigation."
    />
    <script>
      (() => {
        try {
          const key = 'component-atlas-theme';
          const stored = window.localStorage.getItem(key);
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <title>Component Reference Atlas</title>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
